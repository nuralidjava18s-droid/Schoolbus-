<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manajemen Driver</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e90ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="School Bus App">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --primary:#1e90ff;
      --primary-dark:#187bdb;
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --danger:#ef4444;
      --warning:#f59e0b;
      --success:#10b981;
      --shadow:0 8px 24px rgba(15,23,42,0.08);
      --radius:18px;
    }

    body{
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:16px;
      padding-bottom:95px;
      max-width:760px;
      margin:0 auto;
    }

    .topbar{
      background:linear-gradient(135deg, var(--primary), #4aa8ff);
      color:#fff;
      padding:18px 16px;
      border-radius:22px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }

    .topbar-title{
      font-size:22px;
      font-weight:700;
      margin-bottom:6px;
    }

    .topbar-subtitle{
      font-size:13px;
      opacity:.95;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:16px;
    }

    .stat-card{
      background:var(--card);
      border-radius:16px;
      padding:14px;
      box-shadow:var(--shadow);
      border:1px solid #eef2f7;
    }

    .stat-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:700;
      color:var(--text);
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
      border:1px solid #eef2f7;
    }

    .card h4{
      font-size:16px;
      margin-bottom:14px;
      color:var(--text);
    }

    .form-group{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .input-field,
    .textarea-field,
    .btn,
    .search-input{
      width:100%;
      border-radius:14px;
      font-size:14px;
      outline:none;
      transition:.2s ease;
    }

    .input-field,
    .search-input{
      height:46px;
      border:1px solid var(--border);
      background:#fff;
      padding:0 14px;
    }

    .textarea-field{
      min-height:92px;
      border:1px solid var(--border);
      background:#fff;
      padding:12px 14px;
      resize:vertical;
      font-family:Arial, sans-serif;
    }

    .input-field[readonly]{
      background:#f8fafc;
      color:#64748b;
      font-weight:700;
    }

    .input-field:focus,
    .textarea-field:focus,
    .search-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(30,144,255,.12);
    }

    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      height:46px;
      border:none;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    .btn-save{
      background:var(--primary);
    }

    .btn-save:hover{
      background:var(--primary-dark);
    }

    .btn-reset{
      background:#6b7280;
    }

    .btn-reset:hover{
      background:#4b5563;
    }

    .edit-banner{
      display:none;
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fed7aa;
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      margin-bottom:12px;
    }

    .search-wrap{
      margin-bottom:12px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .section-note{
      font-size:12px;
      color:var(--muted);
    }

    .driver-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .driver-item{
      background:#fcfdff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }

    .driver-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }

    .driver-name{
      font-size:17px;
      font-weight:700;
      color:var(--text);
      word-break:break-word;
    }

    .driver-id{
      display:inline-block;
      margin-top:5px;
      font-size:12px;
      font-weight:700;
      color:var(--primary);
      background:rgba(30,144,255,.08);
      padding:5px 10px;
      border-radius:999px;
    }

    .driver-date{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .driver-info{
      display:grid;
      gap:8px;
      margin-bottom:12px;
      font-size:14px;
    }

    .info-row{
      display:flex;
      gap:8px;
      align-items:flex-start;
    }

    .info-label{
      min-width:62px;
      color:var(--muted);
      font-weight:700;
    }

    .info-value{
      flex:1;
      word-break:break-word;
    }

    .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .actions button{
      height:40px;
      border:none;
      border-radius:12px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      cursor:pointer;
    }

    .edit{
      background:var(--warning);
    }

    .delete{
      background:var(--danger);
    }

    .empty-state{
      text-align:center;
      padding:20px 14px;
      color:var(--muted);
      font-size:14px;
      border:1px dashed var(--border);
      border-radius:16px;
      background:#fafcff;
    }

    .loading-text{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:84px;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:.3s;
      z-index:9999;
      max-width:90%;
      text-align:center;
      box-shadow:0 10px 24px rgba(0,0,0,.2);
    }

    .toast.show{
      opacity:1;
    }

    .navbar{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      width:min(760px, calc(100% - 20px));
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow:0 8px 25px rgba(15,23,42,.10);
      border-radius:18px;
      padding:8px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index:999;
    }

    .nav-left,
    .nav-center,
    .nav-right{
      display:flex;
      align-items:center;
    }

    .nav-left,
    .nav-right{
      flex:1;
    }

    .nav-center{
      flex:1.4;
      justify-content:center;
      min-width:0;
    }

    .nav-right{
      justify-content:flex-end;
    }

    .nav-title{
      font-size:14px;
      font-weight:700;
      color:#334155;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav-btn{
      text-decoration:none;
      text-align:center;
      color:#64748b;
      font-weight:700;
      font-size:14px;
      padding:10px 14px;
      border-radius:12px;
      background:#f8fafc;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-width:90px;
      transition:.2s ease;
    }

    .nav-btn:hover{
      background:#e2e8f0;
    }

    @media (max-width:480px){
      .stats{
        grid-template-columns:1fr;
      }

      .btn-row,
      .actions{
        grid-template-columns:1fr;
      }

      .driver-top{
        flex-direction:column;
      }

      .driver-date{
        white-space:normal;
      }

      .navbar{
        gap:6px;
        padding:8px;
      }

      .nav-btn{
        min-width:auto;
        padding:10px 12px;
        font-size:13px;
      }

      .nav-title{
        font-size:13px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-title">Manajemen Driver</div>
    <div class="topbar-subtitle">Kelola data driver dengan tampilan seperti aplikasi mobile</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Driver</div>
      <div class="stat-value" id="totalDriver">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="statusData">Aktif</div>
    </div>
  </div>

  <div class="card">
    <h4>Form Driver</h4>

    <div id="editBanner" class="edit-banner">Mode edit aktif. Perubahan akan memperbarui data driver.</div>

    <div class="form-group">
      <input type="text" id="idAnggotaDriver" class="input-field" placeholder="ID Anggota Otomatis" readonly>
      <input type="text" id="namaDriverBaru" class="input-field" placeholder="Masukkan nama driver">
      <input type="tel" id="noHpDriver" class="input-field" placeholder="Masukkan nomor HP">
      <textarea id="alamatDriver" class="textarea-field" placeholder="Masukkan alamat"></textarea>
      <input type="date" id="tglInputDriver" class="input-field">

      <div id="statusId" class="loading-text"></div>

      <div class="btn-row">
        <button class="btn btn-save" onclick="tambahDriver()">Simpan Driver</button>
        <button class="btn btn-reset" onclick="resetForm()">Reset Form</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-head">
      <h4>Daftar Driver</h4>
      <div class="section-note" id="jumlahTampil">0 data</div>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchDriver" class="search-input" placeholder="Cari nama, ID anggota, no. HP, alamat...">
    </div>

    <div id="driverList" class="driver-list">
      <div class="empty-state">Memuat data driver...</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="navbar">
    <div class="nav-left">
      <button class="nav-btn" onclick="goBack()">⬅️ <span>Back</span></button>
    </div>

    <div class="nav-center">
      <div class="nav-title">School Bus App</div>
    </div>

    <div class="nav-right">
      <a href="index.html" class="nav-btn">🏠 <span>Home</span></a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      updateDoc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxbArCZ6iIWQ8wS7QIonZOeN4t_r9o2WU",
      authDomain: "schoolbus-6a7fd.firebaseapp.com",
      databaseURL: "https://schoolbus-6a7fd-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "schoolbus-6a7fd",
      storageBucket: "schoolbus-6a7fd.firebasestorage.app",
      messagingSenderId: "486602913199",
      appId: "1:486602913199:web:9547f39f5f57f9c87b2b5a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let editDocId = null;
    let allDrivers = [];

    function showToast(message){
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    function getToday(){
      return new Date().toISOString().split("T")[0];
    }

    function escapeHtml(text){
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function generateIdAnggota(){
      const snapshot = await getDocs(collection(db, "drivers"));
      let maxNo = 0;

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const idAnggota = String(data.idAnggota || "").trim();
        const match = idAnggota.match(/^DRV-(\d+)$/);

        if(match){
          const num = parseInt(match[1], 10);
          if(num > maxNo){
            maxNo = num;
          }
        }
      });

      return "DRV-" + String(maxNo + 1).padStart(3, "0");
    }

    async function setAutoId(){
      if(editDocId) return;

      const statusEl = document.getElementById("statusId");
      const inputId = document.getElementById("idAnggotaDriver");

      try{
        statusEl.textContent = "Menyiapkan ID otomatis...";
        inputId.value = await generateIdAnggota();
        statusEl.textContent = "";
      }catch(error){
        console.error(error);
        inputId.value = "";
        statusEl.textContent = "Gagal membuat ID otomatis";
      }
    }

    function setEditMode(active){
      const banner = document.getElementById("editBanner");
      const status = document.getElementById("statusId");

      if(active){
        banner.style.display = "block";
        status.textContent = "Mode edit aktif";
      }else{
        banner.style.display = "none";
        status.textContent = "";
      }
    }

    async function resetForm(){
      editDocId = null;
      document.getElementById("idAnggotaDriver").value = "";
      document.getElementById("namaDriverBaru").value = "";
      document.getElementById("noHpDriver").value = "";
      document.getElementById("alamatDriver").value = "";
      document.getElementById("tglInputDriver").value = getToday();
      setEditMode(false);
      await setAutoId();
    }

    function updateStats(data){
      document.getElementById("totalDriver").textContent = data.length;
      document.getElementById("jumlahTampil").textContent = data.length + " data";
    }

    function renderDriverList(data){
      const list = document.getElementById("driverList");

      if(data.length === 0){
        list.innerHTML = '<div class="empty-state">Data driver tidak ditemukan.</div>';
        updateStats(data);
        return;
      }

      list.innerHTML = "";

      data.forEach((item) => {
        const div = document.createElement("div");
        div.className = "driver-item";
        div.innerHTML = `
          <div class="driver-top">
            <div>
              <div class="driver-name">${escapeHtml(item.nama || "-")}</div>
              <div class="driver-id">${escapeHtml(item.idAnggota || "-")}</div>
            </div>
            <div class="driver-date">${escapeHtml(item.tglInput || "-")}</div>
          </div>

          <div class="driver-info">
            <div class="info-row">
              <div class="info-label">No. HP</div>
              <div class="info-value">${escapeHtml(item.noHp || "-")}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Alamat</div>
              <div class="info-value">${escapeHtml(item.alamat || "-")}</div>
            </div>
          </div>

          <div class="actions">
            <button class="edit">Edit</button>
            <button class="delete">Hapus</button>
          </div>
        `;

        div.querySelector(".edit").addEventListener("click", () => editDriver(item.docId, item));
        div.querySelector(".delete").addEventListener("click", () => hapusDriver(item.docId));

        list.appendChild(div);
      });

      updateStats(data);
    }

    async function loadDriver(){
      const list = document.getElementById("driverList");
      list.innerHTML = '<div class="empty-state">Memuat data driver...</div>';

      try{
        const q = query(collection(db, "drivers"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        allDrivers = [];

        snapshot.forEach((docSnap) => {
          allDrivers.push({
            docId: docSnap.id,
            ...docSnap.data()
          });
        });

        renderDriverList(allDrivers);
      }catch(error){
        console.error(error);
        list.innerHTML = '<div class="empty-state">Gagal memuat data driver.</div>';
        showToast("Gagal memuat data");
      }
    }

    async function tambahDriver(){
      const nama = document.getElementById("namaDriverBaru").value.trim();
      const noHp = document.getElementById("noHpDriver").value.trim();
      const alamat = document.getElementById("alamatDriver").value.trim();
      const tglInput = document.getElementById("tglInputDriver").value.trim();

      if(!nama || !noHp || !alamat || !tglInput){
        showToast("Semua field harus diisi");
        return;
      }

      try{
        if(editDocId){
          await updateDoc(doc(db, "drivers", editDocId), {
            nama,
            noHp,
            alamat,
            tglInput
          });
          showToast("Driver berhasil diupdate");
        }else{
          const idAnggotaBaru = await generateIdAnggota();

          await addDoc(collection(db, "drivers"), {
            idAnggota: idAnggotaBaru,
            nama,
            noHp,
            alamat,
            tglInput,
            createdAt: Date.now()
          });

          showToast("Driver berhasil ditambahkan");
        }

        await resetForm();
        await loadDriver();
      }catch(error){
        console.error(error);
        showToast("Gagal menyimpan driver");
      }
    }

    function editDriver(docId, data){
      editDocId = docId;

      document.getElementById("idAnggotaDriver").value = data.idAnggota || "";
      document.getElementById("namaDriverBaru").value = data.nama || "";
      document.getElementById("noHpDriver").value = data.noHp || "";
      document.getElementById("alamatDriver").value = data.alamat || "";
      document.getElementById("tglInputDriver").value = data.tglInput || getToday();

      setEditMode(true);
      showToast("Mode edit aktif");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function hapusDriver(docId){
      if(!confirm("Yakin ingin menghapus driver ini?")) return;

      try{
        await deleteDoc(doc(db, "drivers", docId));

        if(editDocId === docId){
          await resetForm();
        }else{
          await setAutoId();
        }

        await loadDriver();
        showToast("Driver berhasil dihapus");
      }catch(error){
        console.error(error);
        showToast("Gagal menghapus driver");
      }
    }

    function filterDrivers(){
      const keyword = document.getElementById("searchDriver").value.toLowerCase().trim();

      if(!keyword){
        renderDriverList(allDrivers);
        return;
      }

      const filtered = allDrivers.filter(item => {
        return (
          String(item.nama || "").toLowerCase().includes(keyword) ||
          String(item.idAnggota || "").toLowerCase().includes(keyword) ||
          String(item.noHp || "").toLowerCase().includes(keyword) ||
          String(item.alamat || "").toLowerCase().includes(keyword) ||
          String(item.tglInput || "").toLowerCase().includes(keyword)
        );
      });

      renderDriverList(filtered);
    }

    function goBack(){
      if(window.history.length > 1){
        window.history.back();
      }else{
        window.location.href = "index.html";
      }
    }

    window.goBack = goBack;
    window.tambahDriver = tambahDriver;
    window.resetForm = resetForm;

    document.addEventListener("DOMContentLoaded", async () => {
      document.getElementById("tglInputDriver").value = getToday();
      document.getElementById("searchDriver").addEventListener("input", filterDrivers);

      await setAutoId();
      await loadDriver();
    });
  
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        await navigator.serviceWorker.register("./service-worker.js");
        console.log("Service Worker berhasil didaftarkan");
      } catch (error) {
        console.error("Service Worker gagal:", error);
      }
    });
  }
  </script>
</body>
</html>
