<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfigurasi Harga</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e90ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="School Bus App">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
    }

    :root{
      --primary:#1e90ff;
      --primary-dark:#187bdb;
      --warning:#f39c12;
      --success:#27ae60;
      --bg:#f4f6f9;
      --card:#ffffff;
      --text:#333;
      --muted:#666;
      --border:#dbe3ee;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:16px;
    }

    body{
      background:var(--bg);
      padding:20px;
      padding-bottom:100px;
      color:var(--text);
      max-width:760px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      max-width:500px;
      margin:20px auto;
      padding:20px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      border:1px solid #edf2f7;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:var(--primary);
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
      font-size:14px;
    }

    input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:14px;
      outline:none;
      background:#fff;
    }

    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(30,144,255,0.15);
    }

    button{
      width:100%;
      margin-top:14px;
      padding:12px;
      border:none;
      border-radius:10px;
      color:#fff;
      font-size:14px;
      font-weight:bold;
      cursor:pointer;
      transition:.2s ease;
    }

    .save{
      background:var(--primary);
    }

    .save:hover{
      background:var(--primary-dark);
    }

    .reset{
      background:var(--warning);
    }

    .reset:hover{
      filter:brightness(.96);
    }

    .link{
      background:var(--success);
    }

    .link:hover{
      filter:brightness(.96);
    }

    .info{
      margin-top:16px;
      font-size:13px;
      color:var(--muted);
      background:#f8fafc;
      padding:10px 12px;
      border-radius:10px;
      line-height:1.5;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:84px;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:.3s;
      z-index:9999;
      max-width:90%;
      text-align:center;
      box-shadow:0 10px 24px rgba(0,0,0,.2);
    }

    .toast.show{
      opacity:1;
    }

    .navbar{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:min(760px, calc(100% - 20px));
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow:0 8px 25px rgba(15,23,42,.10);
      border-radius:18px;
      padding:8px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index:999;
    }

    .nav-left,
    .nav-center,
    .nav-right{
      display:flex;
      align-items:center;
    }

    .nav-left,
    .nav-right{
      flex:1;
    }

    .nav-right{
      justify-content:flex-end;
    }

    .nav-center{
      flex:1.4;
      justify-content:center;
      min-width:0;
    }

    .nav-title{
      font-size:14px;
      font-weight:bold;
      color:#334155;
      text-align:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .nav-btn{
      text-decoration:none;
      text-align:center;
      color:#64748b;
      font-weight:700;
      font-size:14px;
      padding:10px 14px;
      border-radius:12px;
      background:#f8fafc;
      transition:.2s;
      border:none;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-width:90px;
    }

    .nav-btn:hover{
      background:#e2e8f0;
    }

    @media (max-width:480px){
      body{
        padding:14px;
        padding-bottom:96px;
      }

      .card{
        padding:16px;
        margin:14px auto;
      }

      .navbar{
        gap:6px;
        padding:8px;
      }

      .nav-title{
        font-size:13px;
      }

      .nav-btn{
        min-width:auto;
        padding:10px 12px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Konfigurasi Harga</h2>

    <label>Password Admin</label>
    <input type="password" id="password" placeholder="Masukkan password">

    <label>Harga Dasar (0–1 km)</label>
    <input type="number" id="hargaDasar" placeholder="Masukkan harga dasar">

    <label>Kenaikan per 0.1 km</label>
    <input type="number" id="kenaikanPerTitik" placeholder="Masukkan kenaikan">

    <button class="save" onclick="simpanHarga()">💾 Simpan Harga</button>
    <button class="reset" onclick="resetHarga()">♻️ Reset ke Default</button>
    <button class="link" onclick="keinput()">➡️ Lanjut ke input</button>

    <div class="info">
      Data harga akan disimpan ke Firestore:
      <b>config / harga</b>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="navbar">
    <div class="nav-left">
      <button class="nav-btn" onclick="goBack()">⬅️ <span>Back</span></button>
    </div>

    <div class="nav-center">
      <div class="nav-title">School Bus App</div>
    </div>

    <div class="nav-right">
      <a href="index.html" class="nav-btn">🏠 <span>Home</span></a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxbArCZ6iIWQ8wS7QIonZOeN4t_r9o2WU",
      authDomain: "schoolbus-6a7fd.firebaseapp.com",
      databaseURL: "https://schoolbus-6a7fd-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "schoolbus-6a7fd",
      storageBucket: "schoolbus-6a7fd.firebasestorage.app",
      messagingSenderId: "486602913199",
      appId: "1:486602913199:web:9547f39f5f57f9c87b2b5a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const PASSWORD_ADMIN = "ali123";
    const DEFAULT_HARGA_DASAR = 608000;
    const DEFAULT_KENAIKAN = 7800;

    function showToast(message){
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    async function muatHarga(){
      try{
        const ref = doc(db, "config", "harga");
        const snap = await getDoc(ref);

        if(snap.exists()){
          const data = snap.data();

          document.getElementById("hargaDasar").value =
            Number(data.hargaDasar) || DEFAULT_HARGA_DASAR;

          document.getElementById("kenaikanPerTitik").value =
            Number(data.kenaikanPerTitik) || DEFAULT_KENAIKAN;
        }else{
          document.getElementById("hargaDasar").value = DEFAULT_HARGA_DASAR;
          document.getElementById("kenaikanPerTitik").value = DEFAULT_KENAIKAN;
        }
      }catch(error){
        console.error("Gagal memuat harga:", error);
        showToast("Gagal memuat harga dari Firebase");
      }
    }

    async function simpanHarga(){
      const pass = document.getElementById("password").value;
      if(pass !== PASSWORD_ADMIN){
        showToast("Password salah");
        return;
      }

      const hargaDasar = Number(document.getElementById("hargaDasar").value);
      const kenaikan = Number(document.getElementById("kenaikanPerTitik").value);

      if(isNaN(hargaDasar) || isNaN(kenaikan) || hargaDasar <= 0 || kenaikan < 0){
        showToast("Input harga tidak valid");
        return;
      }

      try{
        await setDoc(doc(db, "config", "harga"), {
          hargaDasar,
          kenaikanPerTitik: kenaikan,
          updatedAt: serverTimestamp()
        });

        document.getElementById("password").value = "";
        showToast("Harga berhasil diperbarui");
      }catch(error){
        console.error("Gagal simpan harga:", error);
        showToast("Gagal menyimpan harga ke Firebase");
      }
    }

    async function resetHarga(){
      const pass = document.getElementById("password").value;
      if(pass !== PASSWORD_ADMIN){
        showToast("Password salah");
        return;
      }

      try{
        await setDoc(doc(db, "config", "harga"), {
          hargaDasar: DEFAULT_HARGA_DASAR,
          kenaikanPerTitik: DEFAULT_KENAIKAN,
          updatedAt: serverTimestamp()
        });

        await muatHarga();
        document.getElementById("password").value = "";
        showToast("Harga di-reset ke default");
      }catch(error){
        console.error("Gagal reset harga:", error);
        showToast("Gagal reset harga di Firebase");
      }
    }

    function keinput(){
      location.href = "input.html";
    }

    function goBack(){
      if(window.history.length > 1){
        window.history.back();
      }else{
        window.location.href = "index.html";
      }
    }

    window.simpanHarga = simpanHarga;
    window.resetHarga = resetHarga;
    window.keinput = keinput;
    window.goBack = goBack;

    document.addEventListener("DOMContentLoaded", muatHarga);
  
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", async () => {
      try {
        await navigator.serviceWorker.register("./service-worker.js");
        console.log("Service Worker berhasil didaftarkan");
      } catch (error) {
        console.error("Service Worker gagal:", error);
      }
    });
  }
</script>
</body>
</html>
